# spec/contracts.yaml -- the Iris traceability manifest.
#
# One row per behavioral Q/A contract, seeded directly from the contract
# tables in docs/Iris Epics.md (which enumerate the contracts of docs/Iris
# Specification Inventory.md, the source of truth). Each row carries a stable
# id (spec section + slug), a doc anchor into the specification, the cheapest
# proving tier (unit | integration | conformance), and a lifecycle status.
# Non-behavioral contracts (naming, rationale, philosophy) are marked tier and
# status 'exempt' and need no claiming test (S16/exempt-needs-no-test).
#
# The traceability gate (E00.2) reads this file. Do not hand-edit rows out of
# step with a spec delta: a golden diff is a contract diff.
