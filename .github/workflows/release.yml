name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cross-compile
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${target%/*} GOARCH=${target#*/}
            export GOOS GOARCH
            out="dist/iris_${GOOS}_${GOARCH}"
            go build -trimpath -ldflags="-s -w -X github.com/MateusAMP2119/iris-engine-cli/internal/buildinfo.Version=${GITHUB_REF_NAME}" -o "${out}/iris" ./cmd/iris
            tar -czf "${out}.tar.gz" -C "${out}" iris
            rm -r "${out}"
          done
          (cd dist && shasum -a 256 *.tar.gz > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz dist/checksums.txt
