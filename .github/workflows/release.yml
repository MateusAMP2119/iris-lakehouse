name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            # Merge to master → auto version bump.
            # Default = patch.
            # Can be overridden by labels on the merged PR:
            #   release:major / major / breaking   → major bump
            #   release:minor / minor / feature    → minor bump
            # --match excludes the rolling "snapshot" tag from the dev channel.
            LAST=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo v0.0.0)
            BASE=${LAST#v}
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)

            BUMP="patch"
            # Try to find the PR that was merged (the SHA is the merge commit)
            PR_NUMBER=$(gh pr list --state merged --search "$GITHUB_SHA" \
                        --json number --jq '.[0].number' 2>/dev/null || true)

            if [[ -n "$PR_NUMBER" ]]; then
              LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || true)
              if echo "$LABELS" | grep -qiE '(release:)?major|breaking'; then
                BUMP="major"
              elif echo "$LABELS" | grep -qiE '(release:)?minor|feature|feat'; then
                BUMP="minor"
              fi
            else
              # Fallback: check the merge commit message itself
              MSG=$(git log -1 --pretty=%B "$GITHUB_SHA" 2>/dev/null || true)
              if echo "$MSG" | grep -qiE '(release:)?major|\[major\]|breaking'; then
                BUMP="major"
              elif echo "$MSG" | grep -qiE '(release:)?minor|\[minor\]|feature|feat'; then
                BUMP="minor"
              fi
            fi

            if [[ "$BUMP" == "major" ]]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif [[ "$BUMP" == "minor" ]]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using release version: $VERSION"

      - name: Cross-compile
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${{ steps.ver.outputs.version }}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS=${target%/*} GOARCH=${target#*/}
            export GOOS GOARCH
            out="dist/iris_${GOOS}_${GOARCH}"
            bin="iris"
            [[ "$GOOS" == windows ]] && bin="iris.exe"
            go build -trimpath -ldflags="-s -w -X github.com/MateusAMP2119/iris-lakehouse/internal/buildinfo.Version=${VERSION}" -o "${out}/${bin}" ./cmd/iris
            if [[ "$GOOS" == windows ]]; then
              # Windows ships as zip: native Expand-Archive, no tar step in the installer.
              (cd "${out}" && zip -q "../iris_${GOOS}_${GOARCH}.zip" "${bin}")
            else
              tar -czf "${out}.tar.gz" -C "${out}" "${bin}"
            fi
            rm -r "${out}"
          done
          (cd dist && shasum -a 256 *.tar.gz *.zip > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              dist/*.tar.gz dist/*.zip dist/checksums.txt
          fi
