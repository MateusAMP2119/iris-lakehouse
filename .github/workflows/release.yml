name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            # Merge to master: auto-bump patch from latest tag
            LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)
            # strip leading v, split, bump patch
            BASE=${LAST#v}
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using release version: $VERSION"

      - name: Cross-compile
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${{ steps.ver.outputs.version }}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS=${target%/*} GOARCH=${target#*/}
            export GOOS GOARCH
            out="dist/iris_${GOOS}_${GOARCH}"
            go build -trimpath -ldflags="-s -w -X github.com/MateusAMP2119/iris-engine-cli/internal/buildinfo.Version=${VERSION}" -o "${out}/iris" ./cmd/iris
            tar -czf "${out}.tar.gz" -C "${out}" iris
            rm -r "${out}"
          done
          (cd dist && shasum -a 256 *.tar.gz > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              dist/*.tar.gz dist/checksums.txt
          fi
