name: quake_report
run: [python3, main.py]
lane: healthy
logs:
  split: true    # capture the turn protocol transcript beside the stderr log
  stamp: true    # frame the capture with run id, start/end, and outcome
reads:
  - table: demo.quakes
    fields: [id, occurred_at, latitude, longitude, depth_km, magnitude, place, event_type, status]
writes:
  - table: demo.quake_report
    fields: [metric, value]
depends_on: [quake_feed]
